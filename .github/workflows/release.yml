name: Release desktop build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest builds both arm64 and x64 dmgs via electron-builder
        # cross-compile; we have no native deps so this works in one runner.
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:release

  update-release-notes:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Combine install template with auto-generated changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Fill {{VERSION}} in the install template
          sed "s/{{VERSION}}/$VERSION/g" .github/release-template.md > /tmp/notes.md

          # Append GitHub's auto-generated "what changed" section
          printf '\n' >> /tmp/notes.md
          gh api "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq '.body' >> /tmp/notes.md

          gh release edit "$TAG" --notes-file /tmp/notes.md
